<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Palmy — Figma hands control</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #162530;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px;
      gap: 14px;
    }

    /* ── Top bar ── */
    .topbar {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
      color: #fff;
    }

    .brand i { color: #B0FE76; }

    /* ── Status chip ── */
    .status-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1c2f3a;
      border: 1px solid #243d4e;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #888;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #e05555;
      transition: background 0.3s;
    }
    .dot.connected { background: #B0FE76; }

    /* ── Room entry ── */
    #room-entry {
      width: 100%;
      max-width: 400px;
      margin-top: 60px;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      display: none;
    }

    .room-entry-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }

    .room-entry-desc {
      font-size: 13px;
      color: #888;
      text-align: center;
      line-height: 1.6;
    }

    #room-form {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    #room-input {
      flex: 1;
      background: #1c2f3a;
      border: 1px solid #2d4a5c;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 16px;
      font-family: monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }

    #room-input:focus { border-color: #B0FE76; }
    #room-input::placeholder { color: #555; text-transform: none; letter-spacing: 0; }

    #room-submit {
      background: #B0FE76;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #room-submit:hover { background: #8ed44e; }

    /* ── Gesture badge ── */
    .gesture-card {
      width: 100%;
      max-width: 640px;
      background: #1c2f3a;
      border: 1px solid #243d4e;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .gesture-icon {
      color: #B0FE76;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      overflow: visible;
    }

    .gesture-icon svg { overflow: visible; }

    #gesture {
      font-size: 16px;
      font-weight: 600;
      color: #B0FE76;
      min-height: 22px;
      letter-spacing: -0.01em;
    }

    /* ── Canvas ── */
    .canvas-wrap {
      width: 100%;
      max-width: 640px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #0f1e28;
    }

    canvas {
      display: block;
      width: 100%;
    }

    video { display: none; }

    #btn-disconnect {
      display: none;
      background: #2a1a1a;
      color: #e05555;
      border: 1px solid #3a2020;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-disconnect:hover { background: #3a1a1a; }

    /* ── Wizard ── */
    #wizard {
      width: 100%;
      max-width: 640px;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .wizard-step {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .wizard-welcome-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
    }

    .wizard-steps-list {
      font-size: 13px;
      color: #888;
      line-height: 2;
    }

    .wizard-gesture-target {
      width: 100%;
      max-width: 400px;
      background: #1c2f3a;
      border: 1px solid #243d4e;
      border-radius: 10px;
      padding: 24px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      display: flex;
    }

    .wizard-hold-track {
      width: 100%;
      max-width: 400px;
      height: 4px;
      background: #243d4e;
      border-radius: 4px;
      overflow: hidden;
    }

    #wizard-hold-bar {
      height: 100%;
      background: #B0FE76;
      border-radius: 4px;
      width: 0%;
      transition: width 0.05s linear;
    }

    .wizard-progress {
      font-size: 12px;
      color: #888;
    }

    .wizard-actions {
      display: flex;
      gap: 12px;
    }

    .btn-wizard-primary {
      background: #B0FE76;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-wizard-primary:hover:not(:disabled) { background: #8ed44e; }
    .btn-wizard-primary:disabled { opacity: 0.4; cursor: default; }

    .btn-wizard-skip {
      background: transparent;
      color: #888;
      border: 1px solid #2d4a5c;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-wizard-skip:hover { border-color: #888; color: #e0e0e0; }

    .show-guide-link {
      font-size: 11px;
      color: #555;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-top: -8px;
    }
    .show-guide-link:hover { color: #888; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <img src="src/Palmy_horizontal_logo.svg" alt="Palmy" style="height:60px;width:auto;">
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status-chip">
        <div class="dot" id="dot"></div>
        <span id="status">—</span>
      </div>
      <button id="btn-disconnect">Disconnect</button>
    </div>
  </div>

  <!-- Onboarding wizard -->
  <div id="wizard" style="display:none;">

    <!-- Step 1: Welcome -->
    <div id="wizard-step-1" class="wizard-step" style="display:none; padding: 40px 20px;">
      <div class="wizard-welcome-title">Control Figma with your hands</div>
      <div class="wizard-steps-list">
        <div>① Install the <strong style="color:#e0e0e0;">Hand Control</strong> plugin in Figma</div>
        <div>② Open the plugin to get a room code</div>
        <div>③ Enter the code here — then gesture away</div>
      </div>
      <button id="wizard-start" class="btn-wizard-primary">Learn gestures →</button>
    </div>

    <!-- Step 2: Gesture practice -->
    <div id="wizard-step-2" class="wizard-step" style="display:none;">
      <canvas id="wizard-preview" style="border-radius:8px; border:1px solid #0f1e28; max-width:100%;"></canvas>

      <div class="wizard-gesture-target">
        <div class="gesture-icon" id="wizard-gesture-icon" style="width:36px;height:36px;"></div>
        <div id="wizard-gesture-name" style="font-size:18px;font-weight:700;color:#fff;"></div>
        <div id="wizard-gesture-action" style="font-size:12px;color:#888;"></div>
        <div id="wizard-gesture-status" style="font-size:12px;color:#B0FE76;min-height:18px;"></div>
      </div>

      <div class="wizard-hold-track">
        <div id="wizard-hold-bar"></div>
      </div>

      <div class="wizard-progress"><span id="wizard-count">0</span> / 6 learned</div>

      <div class="wizard-actions">
        <button id="wizard-skip" class="btn-wizard-skip">Skip all</button>
        <button id="wizard-connect" class="btn-wizard-primary" disabled>Connect →</button>
      </div>
    </div>
  </div>

  <!-- Room entry screen -->
  <div id="room-entry">
    <div>
      <div class="room-entry-title">Enter your room code</div>
    </div>
    <div class="room-entry-desc">
      Open the <strong style="color:#e0e0e0;">Hand Control</strong> plugin in Figma.<br>
      Copy the room code shown there and paste it below.
    </div>
    <form id="room-form">
      <input id="room-input" type="text" placeholder="e.g. A3K-9XB" maxlength="7" autocomplete="off" />
      <button id="room-submit" type="submit">Connect</button>
    </form>
    <button class="show-guide-link" id="show-guide-again">Show guide again</button>
  </div>

  <!-- Tracker UI (shown after connect) -->
  <div id="tracker-ui" style="display:none; width:100%; max-width:640px; flex-direction:column; gap:14px;">
    <div class="gesture-card">
      <div class="gesture-icon" id="gesture-icon"></div>
      <div id="gesture">—</div>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <video id="video" playsinline></video>
  <script src="dist/tracker.js"></script>
</body>
</html>
