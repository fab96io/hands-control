<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hand Tracker</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px;
      gap: 14px;
    }

    /* ── Top bar ── */
    .topbar {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
      color: #fff;
    }

    .brand i { color: #4ade80; }

    /* ── Status chip ── */
    .status-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #242424;
      border: 1px solid #2e2e2e;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #888;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #e05555;
      transition: background 0.3s;
    }
    .dot.connected { background: #4ade80; }

    /* ── Room entry ── */
    #room-entry {
      width: 100%;
      max-width: 400px;
      margin-top: 60px;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      display: none;
    }

    .room-entry-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }

    .room-entry-desc {
      font-size: 13px;
      color: #888;
      text-align: center;
      line-height: 1.6;
    }

    #room-form {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    #room-input {
      flex: 1;
      background: #242424;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 16px;
      font-family: monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }

    #room-input:focus { border-color: #4ade80; }
    #room-input::placeholder { color: #555; text-transform: none; letter-spacing: 0; }

    #room-submit {
      background: #4ade80;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #room-submit:hover { background: #22c55e; }

    /* ── Gesture badge ── */
    .gesture-card {
      width: 100%;
      max-width: 640px;
      background: #242424;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .gesture-icon {
      color: #4ade80;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      overflow: visible;
    }

    .gesture-icon svg { overflow: visible; }

    #gesture {
      font-size: 16px;
      font-weight: 600;
      color: #4ade80;
      min-height: 22px;
      letter-spacing: -0.01em;
    }

    /* ── Canvas ── */
    .canvas-wrap {
      width: 100%;
      max-width: 640px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }

    canvas {
      display: block;
      width: 100%;
    }

    video { display: none; }

    #btn-disconnect {
      display: none;
      background: #2a1a1a;
      color: #e05555;
      border: 1px solid #3a2020;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-disconnect:hover { background: #3a1a1a; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">Hand Tracker</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status-chip">
        <div class="dot" id="dot"></div>
        <span id="status">—</span>
      </div>
      <button id="btn-disconnect">Disconnect</button>
    </div>
  </div>

  <!-- Room entry screen -->
  <div id="room-entry">
    <div>
      <div class="room-entry-title">Enter your room code</div>
    </div>
    <div class="room-entry-desc">
      Open the <strong style="color:#e0e0e0;">Hand Control</strong> plugin in Figma.<br>
      Copy the room code shown there and paste it below.
    </div>
    <form id="room-form">
      <input id="room-input" type="text" placeholder="e.g. A3K-9XB" maxlength="7" autocomplete="off" />
      <button id="room-submit" type="submit">Connect</button>
    </form>
  </div>

  <!-- Tracker UI (shown after connect) -->
  <div id="tracker-ui" style="display:none; width:100%; max-width:640px; flex-direction:column; gap:14px;">
    <div class="gesture-card">
      <div class="gesture-icon" id="gesture-icon"></div>
      <div id="gesture">—</div>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <video id="video" playsinline></video>
  <script src="dist/tracker.js"></script>
</body>
</html>
