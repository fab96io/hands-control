<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      background: #162530;
      color: #e0e0e0;
      padding: 14px;
      width: 100%;
      overflow: hidden;
    }

    svg { display: inline-block; vertical-align: middle; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      padding: 0 4px;
      margin-bottom: 4px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1c2f3a;
      border: 1px solid #2d4a5c;
      border-radius: 7px;
      cursor: pointer;
      color: #aaa;
      padding: 0;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: #243d4e; }
    #btn-disconnect {
      background: #c0392b;
      border-color: #c0392b;
      color: #fff;
    }
    #btn-disconnect:hover { background: #a93226; border-color: #a93226; }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e05555;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connected { background: #B0FE76; }

    #status {
      color: #888;
      letter-spacing: 0.02em;
    }

    button {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #0f1e28;
      color: #ccc;
      border: 1px solid #2d4a5c;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    button:hover { background: #243d4e; }

    .gesture-wrap {
      background: #1c2f3a;
      border: 1px solid #243d4e;
      border-radius: 8px;
      padding: 16px 12px 14px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #gesture {
      font-size: 20px;
      font-weight: 600;
      color: #B0FE76;
      min-height: 28px;
      letter-spacing: -0.01em;
      text-align: center;
    }

    #coords {
      font-size: 10px;
      color: #8a9ba8;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .nav-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 44px;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .page-title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
    }

    .sliders {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .gesture-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .gesture-table th {
      color: #8a9ba8;
      font-weight: 600;
      text-align: left;
      padding: 4px 10px;
      border-bottom: 1px solid #243d4e;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .gesture-table td {
      padding: 6px 10px;
      color: #ccc;
      border-bottom: 1px solid #162530;
    }

    .gesture-table tr:last-child td { border-bottom: none; }

    .gesture-table td:first-child {
      color: #B0FE76;
      font-weight: 600;
      width: 40%;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slider-label {
      font-size: 11px;
      color: #666;
      width: 30px;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      outline: none;
      padding: 0;
      margin: 0;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 3px;
      background: #243d4e;
      border-radius: 2px;
      border: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #B0FE76;
      cursor: pointer;
      margin-top: -4.5px;
    }

    .slider-val {
      font-size: 11px;
      color: #888;
      width: 18px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .room-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px 14px 16px;
    }

    .room-label {
      font-size: 10px;
      color: #8a9ba8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #room-code {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      letter-spacing: 0.12em;
      text-align: center;
    }

    .room-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .room-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #1c2f3a;
      color: #aaa;
      border: 1px solid #2d4a5c;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-radius: 7px;
      transition: background 0.15s;
    }
    .room-btn:hover { background: #243d4e; }
    #btn-open {
      color: #111;
      border-color: transparent;
      background: #B0FE76;
      font-weight: 500;
    }
    #btn-open:hover { background: #8ed44e; }

    #log {
      font-size: 10px;
      color: #444;
      min-height: 14px;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="header" id="header-connected" style="display:none;">
    <div class="status-row" id="status-row">
      <div class="dot" id="dot"></div>
      <div style="display:flex;flex-direction:column;gap:1px;align-items:flex-start;">
        <span id="status" style="font-size:12px;">Connected</span>
        <span id="header-room-code" style="font-size:12px;color:#4a6a7c;font-variant-numeric:tabular-nums;letter-spacing:0.04em;"></span>
      </div>
    </div>
    <div class="header-actions">
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><path d="M40,88H73a32,32,0,0,0,62,0h81a8,8,0,0,0,0-16H135a32,32,0,0,0-62,0H40a8,8,0,0,0,0,16Zm64-24A16,16,0,1,1,88,80,16,16,0,0,1,104,64ZM216,168H183a32,32,0,0,0-62,0H40a8,8,0,0,0,0,16h81a32,32,0,0,0,62,0h33a8,8,0,0,0,0-16Zm-64,24a16,16,0,1,1,16-16A16,16,0,0,1,152,192Z"/></svg>
      </button>
      <button id="btn-gestures" class="icon-btn" title="Gestures">
        <svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><path d="M188,88a27.75,27.75,0,0,0-12,2.71V60a28,28,0,0,0-41.36-24.6A28,28,0,0,0,80,44v6.71A27.75,27.75,0,0,0,68,48,28,28,0,0,0,40,76v76a88,88,0,0,0,176,0V116A28,28,0,0,0,188,88Zm12,64a72,72,0,0,1-144,0V76a12,12,0,0,1,24,0v44a8,8,0,0,0,16,0V44a12,12,0,0,1,24,0v68a8,8,0,0,0,16,0V60a12,12,0,0,1,24,0v68.67A48.08,48.08,0,0,0,120,176a8,8,0,0,0,16,0,32,32,0,0,1,32-32,8,8,0,0,0,8-8V116a12,12,0,0,1,24,0Z"/></svg>
      </button>
    </div>
  </div>

  <div class="room-hero" id="room-disconnected">
    <div class="room-label">Your room code</div>
    <span id="room-code">—</span>
    <div class="room-actions">
      <button id="btn-copy" class="room-btn">
        <svg width="20" height="20" viewBox="0 0 256 256" fill="currentColor"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"/></svg>
        Copy
      </button>
      <button id="btn-open" class="room-btn">
        Open webcam tracker
      </button>
    </div>
  </div>


  <div id="connected-ui" style="display:none;">
    <div class="gesture-wrap">
      <div id="gesture-icon" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;flex-shrink:0;overflow:visible;"></div>
      <div id="gesture">—</div>
      <div id="coords">pos: — | zoom: —</div>
    </div>
  </div>

  <div id="nav-btns" class="nav-row" style="display:none;">
    <button id="btn-toggle" class="room-btn">
      <svg width="16" height="16" viewBox="0 0 256 256" fill="currentColor"><path d="M200,32H160a16,16,0,0,0-16,16V208a16,16,0,0,0,16,16h40a16,16,0,0,0,16-16V48A16,16,0,0,0,200,32Zm0,176H160V48h40ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Zm0,176H56V48H96Z"/></svg>
      Pause
    </button>
    <button id="btn-disconnect" class="room-btn">
      <svg width="16" height="16" viewBox="0 0 256 256" fill="currentColor"><path d="M112,216a8,8,0,0,1-8,8H48a16,16,0,0,1-16-16V48A16,16,0,0,1,48,32h56a8,8,0,0,1,0,16H48V208h56A8,8,0,0,1,112,216Zm109.66-93.66-40-40a8,8,0,0,0-11.32,11.32L196.69,120H104a8,8,0,0,0,0,16h92.69l-26.35,26.34a8,8,0,0,0,11.32,11.32l40-40A8,8,0,0,0,221.66,122.34Z"/></svg>
      Disconnect
    </button>
  </div>

  <div id="log" style="display:none;"></div>

  <!-- Settings page -->
  <div id="page-settings" style="display:none;">
    <div class="page-header">
      <button id="btn-back-settings" class="icon-btn" title="Back">
        <svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"/></svg>
      </button>
      <span class="page-title">Settings</span>
    </div>
    <div class="sliders">
      <div class="slider-row">
        <svg width="12" height="12" viewBox="0 0 256 256" fill="#555" style="flex-shrink:0;"><path d="M90.34,61.66a8,8,0,0,1,0-11.32l32-32a8,8,0,0,1,11.32,0l32,32a8,8,0,0,1-11.32,11.32L136,43.31V96a8,8,0,0,1-16,0V43.31L101.66,61.66A8,8,0,0,1,90.34,61.66Zm64,132.68L136,212.69V160a8,8,0,0,0-16,0v52.69l-18.34-18.35a8,8,0,0,0-11.32,11.32l32,32a8,8,0,0,0,11.32,0l32-32a8,8,0,0,0-11.32-11.32Zm83.32-72-32-32a8,8,0,0,0-11.32,11.32L212.69,120H160a8,8,0,0,0,0,16h52.69l-18.35,18.34a8,8,0,0,0,11.32,11.32l32-32A8,8,0,0,0,237.66,122.34ZM43.31,136H96a8,8,0,0,0,0-16H43.31l18.35-18.34A8,8,0,0,0,50.34,90.34l-32,32a8,8,0,0,0,0,11.32l32,32a8,8,0,0,0,11.32-11.32Z"/></svg>
        <span class="slider-label">Pan</span>
        <input type="range" id="pan-sens" min="1" max="20" value="5" />
        <span class="slider-val" id="pan-val">5</span>
      </div>
      <div class="slider-row">
        <svg width="12" height="12" viewBox="0 0 256 256" fill="#555" style="flex-shrink:0;"><path d="M152,112a8,8,0,0,1-8,8H120v24a8,8,0,0,1-16,0V120H80a8,8,0,0,1,0-16h24V80a8,8,0,0,1,16,0v24h24A8,8,0,0,1,152,112Zm77.66,117.66a8,8,0,0,1-11.32,0l-50.06-50.07a88.11,88.11,0,1,1,11.31-11.31l50.07,50.06A8,8,0,0,1,229.66,229.66ZM112,184a72,72,0,1,0-72-72A72.08,72.08,0,0,0,112,184Z"/></svg>
        <span class="slider-label">Zoom</span>
        <input type="range" id="zoom-sens" min="1" max="10" value="3" />
        <span class="slider-val" id="zoom-val">3</span>
      </div>
      <div class="slider-row">
        <svg width="12" height="12" viewBox="0 0 256 256" fill="#555" style="flex-shrink:0;"><path d="M188,88a27.75,27.75,0,0,0-12,2.71V60a28,28,0,0,0-41.36-24.6A28,28,0,0,0,80,44v6.71A27.75,27.75,0,0,0,68,48,28,28,0,0,0,40,76v76a88,88,0,0,0,176,0V116A28,28,0,0,0,188,88Zm12,64a72,72,0,0,1-144,0V76a12,12,0,0,1,24,0v44a8,8,0,0,0,16,0V44a12,12,0,0,1,24,0v68a8,8,0,0,0,16,0V60a12,12,0,0,1,24,0v68.67A48.08,48.08,0,0,0,120,176a8,8,0,0,0,16,0,32,32,0,0,1,32-32,8,8,0,0,0,8-8V116a12,12,0,0,1,24,0Z"/></svg>
        <span class="slider-label">Area</span>
        <input type="range" id="track-scale" min="10" max="30" value="10" />
        <span class="slider-val" id="track-val">1.0</span>
      </div>
    </div>
  </div>

  <!-- Gestures page -->
  <div id="page-gestures" style="display:none;">
    <div class="page-header">
      <button id="btn-back-gestures" class="icon-btn" title="Back">
        <svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"/></svg>
      </button>
      <span class="page-title">Gestures</span>
    </div>
    <table class="gesture-table">
      <thead>
        <tr><th>Gesture</th><th>Action</th></tr>
      </thead>
      <tbody>
        <tr><td>Pinch</td><td>Drag node</td></tr>
        <tr><td>Fist</td><td>Deselect all</td></tr>
        <tr><td>Peace ✌️</td><td>Undo</td></tr>
        <tr><td>Open palm</td><td>Select node</td></tr>
        <tr><td>3 fingers</td><td>Pan viewport</td></tr>
        <tr><td>Two hands</td><td>Zoom + rotate</td></tr>
      </tbody>
    </table>
  </div>

  <script src="ui.js"></script>
</body>
</html>
