<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      background: #162530;
      color: #e0e0e0;
      padding: 14px;
      width: 100%;
      overflow: hidden;
    }

    svg { display: inline-block; vertical-align: middle; }

    .header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .plugin-name {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e05555;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connected { background: #B0FE76; }

    #status {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.02em;
    }

    button {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #0f1e28;
      color: #ccc;
      border: 1px solid #2d4a5c;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    button:hover { background: #243d4e; }

    .gesture-wrap {
      background: #1c2f3a;
      border: 1px solid #243d4e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .gesture-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #gesture {
      font-size: 15px;
      font-weight: 600;
      color: #B0FE76;
      min-height: 20px;
      letter-spacing: -0.01em;
    }

    #coords {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    .sliders {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slider-label {
      font-size: 11px;
      color: #666;
      width: 30px;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      outline: none;
      padding: 0;
      margin: 0;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 3px;
      background: #243d4e;
      border-radius: 2px;
      border: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #B0FE76;
      cursor: pointer;
      margin-top: -4.5px;
    }

    .slider-val {
      font-size: 11px;
      color: #888;
      width: 18px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .room-box {
      background: #1c2f3a;
      border: 1px solid #243d4e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .room-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .room-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #room-code {
      flex: 1;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      letter-spacing: 0.1em;
    }

    .room-actions {
      display: flex;
      gap: 6px;
    }

    .room-btn {
      background: #243d4e;
      color: #aaa;
      border: 1px solid #2d4a5c;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 11px;
      border-radius: 5px;
      flex-shrink: 0;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .room-btn:hover { background: #2d4a5c; }
    #btn-open { color: #B0FE76; border-color: #1a3828; background: #0f1e28; }
    #btn-open:hover { background: #1c2f3a; }

    #log {
      font-size: 10px;
      color: #444;
      min-height: 14px;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-row">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="status">Connecting…</span>
    </div>
    <button id="btn-toggle">
      <!-- pause icon -->
      <svg width="11" height="11" viewBox="0 0 256 256" fill="currentColor">
        <path d="M200,32H160a16,16,0,0,0-16,16V208a16,16,0,0,0,16,16h40a16,16,0,0,0,16-16V48A16,16,0,0,0,200,32Zm0,176H160V48h40ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Zm0,176H56V48H96Z"/>
      </svg>
      Pause
    </button>
    </div>
  </div>

  <div class="room-box">
    <div class="room-label">Your room code</div>
    <div class="room-row">
      <span id="room-code">—</span>
      <div class="room-actions">
        <div id="room-actions-disconnected" class="room-actions">
          <button id="btn-copy" class="room-btn">
            <svg width="11" height="11" viewBox="0 0 256 256" fill="currentColor"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"/></svg>
            Copy
          </button>
          <button id="btn-open" class="room-btn">
            <svg width="11" height="11" viewBox="0 0 256 256" fill="currentColor"><path d="M224,104a8,8,0,0,1-16,0V59.32l-66.33,66.34a8,8,0,0,1-11.32-11.32L196.68,48H152a8,8,0,0,1,0-16h64a8,8,0,0,1,8,8Zm-40,24a8,8,0,0,0-8,8v72H48V80h72a8,8,0,0,0,0-16H48A16,16,0,0,0,32,80V208a16,16,0,0,0,16,16H176a16,16,0,0,0,16-16V136A8,8,0,0,0,184,128Z"/></svg>
            Open
          </button>
        </div>
        <div id="room-actions-connected" style="display:none;" class="room-actions">
          <button id="btn-disconnect" class="room-btn" style="color:#e05555;border-color:#3a2020;background:#2a1a1a;">
            <svg width="11" height="11" viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>
            Disconnect
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="connected-ui" style="display:none;">
    <div class="gesture-wrap">
      <div class="gesture-row">
        <div id="gesture-icon" style="display:flex;align-items:center;justify-content:center;width:20px;height:20px;flex-shrink:0;overflow:visible;"></div>
        <div id="gesture">—</div>
      </div>
      <div id="coords">pos: — | zoom: —</div>
    </div>
  </div>

  <div id="sliders-ui" style="display:none;" class="sliders">
    <div class="slider-row">
      <!-- move icon -->
      <svg width="12" height="12" viewBox="0 0 256 256" fill="#555" style="flex-shrink:0;">
        <path d="M90.34,61.66a8,8,0,0,1,0-11.32l32-32a8,8,0,0,1,11.32,0l32,32a8,8,0,0,1-11.32,11.32L136,43.31V96a8,8,0,0,1-16,0V43.31L101.66,61.66A8,8,0,0,1,90.34,61.66Zm64,132.68L136,212.69V160a8,8,0,0,0-16,0v52.69l-18.34-18.35a8,8,0,0,0-11.32,11.32l32,32a8,8,0,0,0,11.32,0l32-32a8,8,0,0,0-11.32-11.32Zm83.32-72-32-32a8,8,0,0,0-11.32,11.32L212.69,120H160a8,8,0,0,0,0,16h52.69l-18.35,18.34a8,8,0,0,0,11.32,11.32l32-32A8,8,0,0,0,237.66,122.34ZM43.31,136H96a8,8,0,0,0,0-16H43.31l18.35-18.34A8,8,0,0,0,50.34,90.34l-32,32a8,8,0,0,0,0,11.32l32,32a8,8,0,0,0,11.32-11.32Z"/>
      </svg>
      <span class="slider-label">Pan</span>
      <input type="range" id="pan-sens" min="1" max="20" value="5" />
      <span class="slider-val" id="pan-val">5</span>
    </div>
    <div class="slider-row">
      <!-- zoom-in icon -->
      <svg width="12" height="12" viewBox="0 0 256 256" fill="#555" style="flex-shrink:0;">
        <path d="M152,112a8,8,0,0,1-8,8H120v24a8,8,0,0,1-16,0V120H80a8,8,0,0,1,0-16h24V80a8,8,0,0,1,16,0v24h24A8,8,0,0,1,152,112Zm77.66,117.66a8,8,0,0,1-11.32,0l-50.06-50.07a88.11,88.11,0,1,1,11.31-11.31l50.07,50.06A8,8,0,0,1,229.66,229.66ZM112,184a72,72,0,1,0-72-72A72.08,72.08,0,0,0,112,184Z"/>
      </svg>
      <span class="slider-label">Zoom</span>
      <input type="range" id="zoom-sens" min="1" max="10" value="3" />
      <span class="slider-val" id="zoom-val">3</span>
    </div>
    <div class="slider-row">
      <!-- hand/area icon -->
      <svg width="12" height="12" viewBox="0 0 256 256" fill="#555" style="flex-shrink:0;">
        <path d="M188,88a27.75,27.75,0,0,0-12,2.71V60a28,28,0,0,0-41.36-24.6A28,28,0,0,0,80,44v6.71A27.75,27.75,0,0,0,68,48,28,28,0,0,0,40,76v76a88,88,0,0,0,176,0V116A28,28,0,0,0,188,88Zm12,64a72,72,0,0,1-144,0V76a12,12,0,0,1,24,0v44a8,8,0,0,0,16,0V44a12,12,0,0,1,24,0v68a8,8,0,0,0,16,0V60a12,12,0,0,1,24,0v68.67A48.08,48.08,0,0,0,120,176a8,8,0,0,0,16,0,32,32,0,0,1,32-32,8,8,0,0,0,8-8V116a12,12,0,0,1,24,0Z"/>
      </svg>
      <span class="slider-label">Area</span>
      <input type="range" id="track-scale" min="10" max="30" value="10" />
      <span class="slider-val" id="track-val">1.0</span>
    </div>
  </div>

  <div id="log" style="display:none;"></div>

  <script src="ui.js"></script>
</body>
</html>
